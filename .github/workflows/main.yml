name: Build and Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

# Grant permissions required for GitHub Pages deployment
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Production Application
        run: npm run build -- --configuration=production

      # Deploys the built files automatically to a isolated 'gh-pages' branch
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/DAP # <-- Replace with your exact project folder name inside /dist
          branch: gh-pages
